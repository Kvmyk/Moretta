name: CI Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests (deep-scan + migration formats + upload formats)
        run: |
          pytest -q backend/tests/test_detector.py backend/tests/test_migration_formats.py backend/tests/test_core.py -k "deep_scan or upload_docx_file or upload_xlsx_file or upload_pdf_file or migration_preserves_docx_blob_content or migration_preserves_xlsx_blob_content"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (includes TypeScript check)
        working-directory: frontend
        run: npm run build
