version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: privateproxy-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - privateproxy-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: privateproxy-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - privateproxy-net

  ollama:
    image: ollama/ollama
    container_name: privateproxy-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - privateproxy-net

volumes:
  ollama_data:

networks:
  privateproxy-net:
    driver: bridge
